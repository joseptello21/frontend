<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">
        <i class="fa-solid fa-user-plus"></i>
      </div>
      <h1>Registro de Usuario</h1>
      <p>Crea tu cuenta con el email que usarás para ingresar.</p>
    </div>

    <form class="login-form" (ngSubmit)="register()">
      <div class="form-group">
        <label for="name">Nombre completo</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-id-card"></i>
          <input id="name" type="text" name="name" [(ngModel)]="name" placeholder="Tu nombre completo" autocomplete="name" [disabled]="loading" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="Tu email" autocomplete="email" [disabled]="loading" />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input id="password" type="password" name="password" [(ngModel)]="password" placeholder="Contraseña" [disabled]="loading" />
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar contraseña</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input id="confirmPassword" type="password" name="confirmPassword" [(ngModel)]="confirmPassword" placeholder="Repite la contraseña" [disabled]="loading" />
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span>{{ errorMessage }}</span>
      </div>

      <div class="success-message" *ngIf="successMessage">
        <i class="fa-solid fa-circle-check"></i>
        <span>{{ successMessage }}</span>
      </div>

      <button type="submit" [disabled]="loading">
        <span *ngIf="!loading">Crear cuenta</span>
        <span class="loading-content" *ngIf="loading">
          <span class="spinner"></span>
          Registrando...
        </span>
      </button>

      <div class="register-link">
        <span>¿Ya tienes cuenta?</span>
        <a [routerLink]="['/login']">Inicia sesión</a>
      </div>
    </form>
  </div>
</div>
