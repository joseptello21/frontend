<div class="login-container">
  <div class="login-card">
    <h1>Iniciar Sesión</h1>
    <p class="subtitle">Sistema de Gestión</p>

    @if (error()) {
      <div class="error-message">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email"
          placeholder="Ingrese su email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password"
          placeholder="Ingrese su contraseña"
          required
        />
      </div>

      <button type="button" class="link-button" (click)="toggleForgotPassword()">
        ¿Olvidaste tu contraseña?
      </button>

      @if (showForgot) {
        <div class="forgot-password-card">
          <h2>Recuperar contraseña</h2>
          <p>Ingresa tu email y te enviaremos un enlace para restablecerla.</p>

          @if (forgotMessage()) {
            <div class="success-message">{{ forgotMessage() }}</div>
          }

          @if (forgotError()) {
            <div class="error-message">{{ forgotError() }}</div>
          }

          <div class="form-group">
            <label for="forgotEmail">Email de recuperación</label>
            <input 
              type="email"
              id="forgotEmail"
              [(ngModel)]="forgotEmail"
              name="forgotEmail"
              placeholder="Ingrese su email"
            />
          </div>

          <div class="forgot-actions">
            <button type="button" class="btn btn-secondary" (click)="sendForgotPassword()" [disabled]="loading()">
              Enviar enlace
            </button>
            <button type="button" class="btn btn-light" (click)="toggleForgotPassword()">
              Cancelar
            </button>
          </div>
        </div>
      }

      <button type="submit" [disabled]="loading()">
        @if (loading()) {
          <span>Cargando...</span>
        } @else {
          <span>Iniciar Sesión</span>
        }
      </button>
    </form>
  </div>
</div>
