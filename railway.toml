[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run serve:prod"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[build.env]
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "20.20.0"
NODE_VERSION = "20.20.0"

[deploy.env]
NODE_ENV = "production"